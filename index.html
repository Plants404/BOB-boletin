<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BOB | Boletín Oficial del Board</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Quill -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">

    <!-- Flatpickr -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <div class="container">

        <a href="#inicio">

            <img src="image/bob lgo.png"
                 class="logo"
                 alt="Logo BOB">

        </a>

        <nav>

            <a href="#inicio">
                <i class="fa-solid fa-house"></i>
                Inicio
            </a>

            <a href="#novedades">
                <i class="fa-solid fa-newspaper"></i>
                Novedades
            </a>

            <a href="#publicar">
                <i class="fa-solid fa-pen"></i>
                Publicar
            </a>

            <a href="novedades.html">
                <i class="fa-solid fa-book-open"></i>
                Historial
            </a>

        </nav>

    </div>

</header>

<main>

<!-- HERO -->

<section class="hero" id="inicio">

    <div class="hero-text">

        <h1>Boletín Oficial del Board</h1>

        <p>

            Plataforma oficial para comunicar anuncios,
            resoluciones, eventos y novedades del Board.

        </p>

        <a href="#publicar" class="btn">

            <i class="fa-solid fa-plus"></i>

            Nueva publicación

        </a>

    </div>

</section>

<!-- NOVEDADES -->

<section class="novedades" id="novedades">

    <div class="titulo-seccion">

        <h2>

            <i class="fa-solid fa-bullhorn"></i>

            Últimas novedades

        </h2>

        <a href="novedades.html" class="btn-secundario">

            Ver historial →

        </a>

    </div>

    <div id="loading">

        <i class="fa-solid fa-spinner fa-spin"></i>

        Cargando publicaciones...

    </div>

    <div id="contenedorNoticias">

        <!-- JavaScript -->

    </div>

</section>

<!-- FORMULARIO -->

<section class="formulario" id="publicar">

    <h2>

        <i class="fa-solid fa-pen-to-square"></i>

        Nueva publicación

    </h2>

    <form id="newsForm">

        <label>Título</label>

        <input
            type="text"
            id="titulo"
            placeholder="Ingrese el título"
            required>

        <label>Fecha</label>

        <input
            type="text"
            id="fecha"
            required>

        <label>Contenido</label>

        <div id="editor"></div>

        <button type="submit">

            <i class="fa-solid fa-paper-plane"></i>

            Publicar

        </button>

    </form>

</section>

</main>

<footer>

    <p>

        © 2026 Boletín Oficial del Board

    </p>

</footer>

<!-- LIBRERÍAS -->

<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- JS -->

<script src="editor.js"></script>

<script src="calendario.js"></script>

<script src="ui.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
</body>

</html>>
