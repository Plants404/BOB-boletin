<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Historial de Novedades | BOB</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Flatpickr -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <div class="container">

        <a href="index.html">

            <img
                src="image/bob lgo.png"
                class="logo"
                alt="Logo BOB">

        </a>

        <nav>

            <a href="index.html">

                <i class="fa-solid fa-house"></i>

                Inicio

            </a>

            <a href="novedades.html">

                <i class="fa-solid fa-book-open"></i>

                Historial

            </a>

            <a href="index.html#publicar">

                <i class="fa-solid fa-plus"></i>

                Publicar

            </a>

        </nav>

    </div>

</header>

<main>

<section class="hero hero-small">

    <div class="hero-text">

        <h1>

            Historial de publicaciones

        </h1>

        <p>

            Consulte todas las novedades oficiales publicadas por el Board.

        </p>

    </div>

</section>

<section class="novedades">

    <div class="titulo-seccion">

        <h2>

            <i class="fa-solid fa-newspaper"></i>

            Todas las publicaciones

        </h2>

        <a href="index.html" class="btn-secundario">

            ← Volver

        </a>

    </div>

    <!-- Barra de herramientas -->

    <div class="barra-herramientas">

        <div class="buscador">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="buscar"
                placeholder="Buscar por título o contenido...">

        </div>

        <div class="filtros">

            <select id="ordenar">

                <option value="desc">
                    Más recientes
                </option>

                <option value="asc">
                    Más antiguas
                </option>

            </select>

            <input
                type="text"
                id="filtroFecha"
                placeholder="Filtrar por fecha">

        </div>

    </div>

    <!-- Loader -->

    <div id="loading">

        <i class="fa-solid fa-spinner fa-spin"></i>

        Cargando publicaciones...

    </div>

    <!-- Contador -->

    <div id="contadorNoticias" class="contador">

        0 publicaciones

    </div>

    <!-- Contenedor -->

    <div id="contenedorNoticias">

    </div>

</section>

</main>

<footer>

    <p>

        © 2026 Boletín Oficial del Board

    </p>

</footer>

<!-- Librerías -->

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- JS -->

<script src="calendario.js"></script>
<script src="ui.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>

</body>

</html>
